<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journalist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header_sec">
        <h1 id="h1header">Journalist</h1>
        <p id="pheader">Quiet log of my pathway</p>
    </header>
    <main id="main_sec">
        <div id="editor">
            <textarea id="journal_editor" placeholder="Write your journal entry here..."></textarea>
            <button id="save_journal_button">Save Entry</button>
        </div>
    </main>
    <section id="entries_sec">
        <input type="text" id="search_input" placeholder="Search entries...">
        <div id="entries_container">
            <!-- Journal entries will be displayed here -->
        </div>
    </section>

</body>
<script src="script.js"></script>
</html>
