<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journalist</title>
    <link rel="stylesheet" href="/fonts/lora.css">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FAF9F6">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="page">

        <div id="toggle">
            <button id="logoutBtn" style="display:none;">Wyloguj</button>
            <button id="themeToggle" class="theme-toggle" aria-label="Przełącz motyw">
                Dark
            </button>
        </div>

        <header id="header_sec">
            <h1 id="h1header">Journalist</h1>
            <p id="pheader"> quiet log for pauses and notes along your pathway</p>
        </header>

    <section id="authSec" style="display:none;">
        
        <div class="auth-card">
            
            <p class="auth-subtitle">Login to use Journalist</p>
            <button id="googleLoginBtn" class="auth-btn">Login with google</button>
            <p id="authError" class="auth-error" style="display:none;"></p>
        </div>
    </section>
    <main id="main_sec">
            <div id="journal">
                <p id="journal_label">What is on your mind?</p>
                <div class="category_input_wrap">
                <input
                    id="entry_category"
                    type="text"
                    placeholder="Category (np. Nauka, Praca)"
                    autocomplete="off">
                <div id="category_dropdown" class="category_dropdown hidden"></div>
                </div>
                <input id="entry_title" type="text" placeholder="Entry Title">
                <textarea id="journal_editor" placeholder="Write your journal entry here..."></textarea>
                <button id="save_journal_button">Save Entry</button>  
            </div>
            
    </main>
    <section id="entries_sec">
        <div class="filters_row">
            <input type="text" id="search_input" placeholder="Search entries...">
            <select id="categoryfilter">
            <option value="" disabled selected hidden>Choose category</option>
            <option value="work">Work</option>
            <option value="study">Study</option>
            </select>
        </div>

        <div id="entries_container">
            <!-- Journal entries will be displayed here -->
        </div>
    </section>
    </div>
    <section id="entry_detail">

    </section>

    <div id="toast" class="toast">Link copied</div>
    
    <div id="deleteModal" class="modal hidden">
  <div class="modal_content">
    <p class="modal_text">Are you sure you want to delete this entry?</p>
    <div class="modal_actions">
      <button id="deleteCancel" class="btn_secondary">Cancel</button>
      <button id="deleteConfirm" class="btn_danger">Delete</button>
    </div>
  </div>
</div>
</body>
<script type="module" src="index.js"></script>
</html>
